<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Barashka — Login</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    'Inter',
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    Roboto,
                    sans-serif;
                background: #0a0a0a;
                color: #e0e0e0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .login-container {
                width: 100%;
                max-width: 380px;
                padding: 2rem;
            }

            .logo {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
                margin-bottom: 2.5rem;
            }

            .logo svg {
                width: 40px;
                height: 40px;
            }

            .logo span {
                font-size: 1.5rem;
                font-weight: 600;
                letter-spacing: -0.02em;
                color: #fff;
            }

            .btn {
                width: 100%;
                padding: 0.75rem 1rem;
                border: 1px solid #2a2a2a;
                border-radius: 8px;
                background: #151515;
                color: #e0e0e0;
                font-size: 0.925rem;
                font-family: inherit;
                cursor: pointer;
                transition:
                    background 0.15s,
                    border-color 0.15s;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            }

            .btn:hover {
                background: #1e1e1e;
                border-color: #3a3a3a;
            }
            .btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .btn-primary {
                background: #fff;
                color: #0a0a0a;
                border-color: #fff;
                font-weight: 600;
            }

            .btn-primary:hover {
                background: #e0e0e0;
                border-color: #e0e0e0;
            }

            .divider {
                display: flex;
                align-items: center;
                gap: 1rem;
                margin: 1.5rem 0;
                color: #555;
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .divider::before,
            .divider::after {
                content: '';
                flex: 1;
                height: 1px;
                background: #2a2a2a;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-group input {
                width: 100%;
                padding: 0.75rem 1rem;
                border: 1px solid #2a2a2a;
                border-radius: 8px;
                background: #151515;
                color: #e0e0e0;
                font-size: 0.925rem;
                font-family: inherit;
                outline: none;
                transition: border-color 0.15s;
            }

            .form-group input:focus {
                border-color: #555;
            }

            .error-msg {
                background: #1a0000;
                border: 1px solid #3a1111;
                color: #ff6b6b;
                padding: 0.75rem 1rem;
                border-radius: 8px;
                font-size: 0.85rem;
                margin-bottom: 1rem;
                display: none;
            }

            .spinner {
                width: 18px;
                height: 18px;
                border: 2px solid transparent;
                border-top-color: currentColor;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
                display: none;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .google-icon {
                width: 18px;
                height: 18px;
            }
        </style>
    </head>

            <form id="email-form" onsubmit="emailAuth(event)" style="display: none">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required autocomplete="email" />
                </div>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                        autocomplete="current-password"
                    />
                </div>
                <button type="submit" id="email-btn" class="btn btn-primary">
                    <span id="email-btn-text">Sign In</span>
                    <span id="email-btn-spinner" class="spinner"></span>
                </button>
                <div style="margin-top: 1rem; text-align: center">
                    <button type="button" id="toggle-auth-mode" class="btn" style="font-size: 0.85rem; padding: 0.5rem">

        <script type="module">
            import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
            import {
                getAuth,
                GoogleAuthProvider,
                signInWithPopup,
                signInWithEmailAndPassword,
                createUserWithEmailAndPassword,
            } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

            const STORAGE_KEY = 'monochrome-firebase-config';
            const DEFAULT_CONFIG = {
                apiKey: 'AIzaSyDPU-unAjuLtQJt4IkGS5faG50UCF7lYyA',
                authDomain: 'monochrome-database.firebaseapp.com',
                projectId: 'monochrome-database',
                storageBucket: 'monochrome-database.firebasestorage.app',
                messagingSenderId: '895657412760',
                appId: '1:895657412760:web:e81c5044c7f4e9b799e8ed',
            };

            // Check for setup_firebase hash import
            const hash = window.location.hash;
            if (hash.startsWith('#setup_firebase=')) {
                try {
                    const encoded = hash.split('#setup_firebase=')[1];
                    const config = JSON.parse(atob(encoded));
                    if (config.apiKey && config.authDomain) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
                        window.history.replaceState(null, null, '/login');
                    }
                } catch (e) {
                    console.warn('Failed to import Firebase config from hash:', e);
                }
            }

            let storedConfig = null;
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) storedConfig = JSON.parse(raw);
            } catch (_) {}

            // Priority: server-injected env > localStorage > hash-imported > default
            const firebaseConfig = window.__FIREBASE_CONFIG__ || storedConfig || DEFAULT_CONFIG;
            // Sync to localStorage so the app's config.js picks up the same project
            if (window.__FIREBASE_CONFIG__ && !storedConfig) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(firebaseConfig));
            }
            const fbApp = initializeApp(firebaseConfig);
            const auth = getAuth(fbApp);
            const provider = new GoogleAuthProvider();

            function showError(msg) {
                const el = document.getElementById('error');
                el.textContent = msg;
                el.style.display = 'block';
            }

            function hideError() {
                document.getElementById('error').style.display = 'none';
            }

            const googleBtn = document.getElementById('google-btn');
            const emailForm = document.getElementById('email-form');
            const divider = document.getElementById('divider');
            const providerState = {
                google: true,
                password: true,
            };
            const providerConfig = window.__AUTH_PROVIDERS__ || {};
            if (typeof providerConfig.google === 'boolean') providerState.google = providerConfig.google;
            if (typeof providerConfig.password === 'boolean') providerState.password = providerConfig.password;

            const NO_PROVIDER_MESSAGE = 'No sign-in providers are enabled for this Firebase project.';

            // Auth mode: 'signin' or 'signup'
            let authMode = 'signin';

            function renderProviders() {
                if (googleBtn) googleBtn.style.display = providerState.google ? '' : 'none';
                if (emailForm) emailForm.style.display = providerState.password ? '' : 'none';
                if (divider) divider.style.display = providerState.google && providerState.password ? '' : 'none';
                if (!providerState.google && !providerState.password) {
                    showError(NO_PROVIDER_MESSAGE);
                }
            }

            renderProviders();

            // Toggle between Sign In and Sign Up
            const toggleBtn = document.getElementById('toggle-auth-mode');
            const emailBtnText = document.getElementById('email-btn-text');

            toggleBtn.addEventListener('click', () => {
                authMode = authMode === 'signin' ? 'signup' : 'signin';
                if (authMode === 'signup') {
                    toggleBtn.textContent = 'Already have an account? Sign In';
                    emailBtnText.textContent = 'Sign Up';
                } else {
                    toggleBtn.textContent = 'Need an account? Sign Up';
                    emailBtnText.textContent = 'Sign In';
                }
            });

            function setLoading(loading) {
                document.getElementById('google-btn').disabled = loading;
                document.getElementById('email-btn').disabled = loading;
                document.getElementById('email-btn-text').style.display = loading ? 'none' : 'inline';
                document.getElementById('email-btn-spinner').style.display = loading ? 'inline-block' : 'none';
            }

            async function sendTokenToServer(user) {
                const token = await user.getIdToken();

                // Try to send to auth gate server (if enabled)
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token }),
                    });
                    if (!res.ok) {
                        const data = await res.json().catch(() => ({}));
                        throw new Error(data.error || 'Server authentication failed');
                    }
                    window.location.href = '/';
                } catch (serverError) {
                    // Auth gate not enabled, just redirect with user info
                    window.location.href = `/index.html?userId=${user.uid}&secret=${token}`;
                }
            }

            window.googleSignIn = async function () {
                hideError();
                setLoading(true);
                try {
                    const result = await signInWithPopup(auth, provider);
                    await sendTokenToServer(result.user);
                } catch (err) {
                    if (err.code !== 'auth/popup-closed-by-user') {
                        showError(err.message);
                    }
                    setLoading(false);
                }
            };

            window.emailAuth = async function (e) {
                e.preventDefault();
                hideError();
                setLoading(true);

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    let result;
                    if (authMode === 'signup') {
                        result = await createUserWithEmailAndPassword(auth, email, password);
                    } else {
                        result = await signInWithEmailAndPassword(auth, email, password);
                    }
                    await sendTokenToServer(result.user);
                } catch (err) {
                    if (authMode === 'signup') {
                        if (err.code === 'auth/email-already-in-use') {
                            showError('This email is already registered. Please sign in instead.');
                        } else if (err.code === 'auth/weak-password') {
                            showError('Password should be at least 6 characters.');
                        } else if (err.code === 'auth/invalid-email') {
                            showError('Invalid email address.');
                        } else {
                            showError(err.message);
                        }
                    } else {
                        if (err.code === 'auth/user-not-found') {
                            showError('No account found. Please sign up first.');
                        } else if (err.code === 'auth/wrong-password') {
                            showError('Incorrect password.');
                        } else if (err.code === 'auth/invalid-credential') {
                            showError('Invalid credentials. Please check your email and password.');
                        } else {
                            showError(err.message);
                        }
                    }
                    setLoading(false);
                }
            };
        </script>
    </body>
</html>
