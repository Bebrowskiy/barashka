name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ============================================================================
  # Job 1: Build web frontend
  # ============================================================================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package dist
        run: zip -r dist.zip dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist.zip
          retention-days: 1

  # ============================================================================
  # Job 2: Build Tauri desktop apps (matrix: Windows, macOS, Linux)
  # ============================================================================
  build-desktop:
    name: Desktop (${{ matrix.platform }})
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            targets: 'msi,nsis'
          - platform: macos-latest
            targets: 'dmg,app'
          - platform: ubuntu-22.04
            targets: 'deb,appimage'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Barashka ${{ github.ref_name }}'
          releaseBody: 'See the assets below for downloadable installers.'
          releaseDraft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
          targets: ${{ matrix.targets }}

  # ============================================================================
  # Job 3: Upload web dist to the release created by tauri-action
  # ============================================================================
  upload-web-dist:
    name: Upload Web Dist
    needs: [build-web, build-desktop]
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Upload dist.zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" dist.zip --clobber
