name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ============================================================================
  # Job 1: Run tests
  # ============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ============================================================================
  # Job 2: Build web + source archive + create release
  # ============================================================================
  build:
    name: Build & Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package web build
        run: zip -r dist.zip dist/

      - name: Create source archive
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          git archive --format=tar.gz --prefix="barashka-${TAG}/" -o "barashka-${TAG}-src.tar.gz" HEAD

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PRERELEASE=""
          if echo "$TAG" | grep -qE '\-(alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" \
            --title "Barashka $TAG" \
            --notes "See the assets below for downloadable files." \
            $PRERELEASE \
            dist.zip \
            barashka-*-src.tar.gz
